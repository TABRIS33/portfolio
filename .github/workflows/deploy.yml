name: Deploy Astro Portfolio to GitHub Pages

on:
  push:
    branches: [ main ]       # 每次 push 到 main 分支触发
  workflow_dispatch:          # 允许手动触发

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:                     # Job key = build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18    # 使用 Node 18

      - name: Install dependencies
        run: npm install      # 安装 package.json 中依赖

      - name: Build Astro site
        run: npx astro build  # 使用 npx 调用本地 CLI

      - name: Upload artifact for deploy
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: ./dist

  deploy:                    # Job key = deploy
    needs: build             # 依赖 build job
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v3
        with:
          name: dist
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          folder: ./dist