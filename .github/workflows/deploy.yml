name: Deploy Astro Portfolio to GitHub Pages

on:
  push:
    branches: [ main ]       # 每次 push 到 main 分支触发
  workflow_dispatch:          # 允许手动触发

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Astro CLI globally
        run: npm install -g astro@latest

      - name: Install project dependencies
        run: npm ci

      - name: Build Astro site
        run: astro build   # 全局 CLI 保证有执行权限

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist

  deploy:                    # Job key = deploy
    needs: build             # 依赖 build job
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          folder: ./dist