name: Deploy Astro Portfolio to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ 获取代码
      - uses: actions/checkout@v5

      # 2️⃣ 设置 Node 版本
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24   # Astro 支持 >=22.12

      # 3️⃣ 安装依赖
      - name: Install project dependencies
        run: npm ci

      # 4️⃣ 构建 Astro 网站
      - name: Build Astro site
        run: npx astro build


  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4